l_english:
 atla_bending.0001.t:0 "Reaching for Perfection"
 atla_bending.0001.desc:0 "As night falls outside of my palace, I can finally rest after this tiresome day spent dealing with mundane papers and requests from my domain.\n\nSome of my courtiers started reciting [ROOT.Char.Custom('GetAtlaPlayName')] for my supper. Everything seems perfect on this beautiful evening until I see that my favorite [ROOT.Char.Custom('GetAtlaFood')] was put just outside of my reach by my servant, and [random_courtier.GetFirstName] is going to eat it all!\n\nThankfully, as a [ROOT.Char.Custom('GetBendingElement')]bender, I can easily get my delightful meal out of [random_courtier.GetHerHis] grip without having to move but a finger or two. Or perhaps I could ask [random_courtier.GetHerHim] to bring it closer for me?"
 
 atla_bending.0001.a:0 "This is going to be easy with [ROOT.Char.Custom('GetBendingElement')]bending."
 atla_bending.0001.b:0 "I'll ask [random_courtier.GetFirstNameNoTooltip] to bring it to me."
 atla_bending.0001.c:0 "Maybe… Maybe I can just barely reach it?"
 atla_bending.0001.d:0 "[random_courtier.GetSheHe|U] can keep it. I already had my fill for tonight."

