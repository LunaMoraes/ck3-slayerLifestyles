l_english:
 # Lifestyle
 slayer_lifestyle_name:0 "Slayer"
 slayer_lifestyle_desc:0 "The world is full of dark terrors. By dedicating yourself to the slayer's task, you protect your realm from the shadows and earn glory through bloodshed."
 slayer_lifestyle_highlight_desc:0 "Because of your Martial or Intrigue [education|E], you gain #P [GetPlayer.Custom('GetEducationLifestylePercentageBoost')]#! more [experience|E] in this Lifestyle."
 # Tree Names
 beast_slayer_name:0 "Beast Slayer"
 beast_slayer_desc:0 "Focus on taking assignments from a master to track and slay the physical monsters that roam the wilds."
 human_slayer_name:0 "Manhunter"
 human_slayer_desc:0 "Focus on using fear, tracking, and brutal execution to eliminate outlaws and player killers."
 ethereal_slayer_name:0 "Ethereal Slayer"
 ethereal_slayer_desc:0 "Focus on piety, holy armaments, and learning to banish abyssal demons and spirits."

 # Focuses
 slayer_beast_focus:0 "Beast Hunting"
 slayer_beast_focus_desc:0 "Focus on taking dangerous slayer assignments and hunting massive beasts."
 slayer_beast_focus_effect_desc:0 "Focusing on beast hunting grants you:"
 slayer_human_focus:0 "Bounty Hunting"
 slayer_human_focus_desc:0 "Focus on tracking down outlaws and player killers for their bounties."
  slayer_human_focus_effect_desc:0 "Focusing on bounty hunting grants you:"
 slayer_ethereal_focus:0 "Demon Hunting"
 slayer_ethereal_focus_desc:0 "Focus on banishing abyssal demons and supernatural terrors."
  slayer_ethereal_focus_effect_desc:0 "Focusing on demon hunting grants you:"

 # Traits
 trait_apex_predator:0 "Apex Predator"
 trait_apex_predator_desc:0 "This character is a Slayer Master, an apex predator feared by all creatures."
 trait_master_executioner:0 "Master Executioner"
 trait_master_executioner_desc:0 "This character is a ruthless manhunter, specializing in lethal special attacks."
 trait_demon_hunter:0 "Demon Hunter"
 trait_demon_hunter_desc:0 "This character is a holy exorcist, armed with demonbane and protective prayers."

 # Beast Slayer Perks
 monster_hunter_perk_name:0 "Monster Hunter"
 monster_hunter_perk_desc:0 "Your experience taking on dangerous slayer assignments prepares you to face the unknown."
 monster_hunter_perk_effect:0 "Allows you to track beast sightings and harvest trophies."
 thick_hide_perk_name:0 "Thick Hide"
 thick_hide_perk_desc:0 "Hardened leathers, spined helmets, and witchwood charms protect you from sudden strikes in the dark."
 beast_tactics_perk_name:0 "Beast Tactics"
 beast_tactics_perk_desc:0 "You have learned the specific tactics required to bring down creatures with thick hides and gargoyle-like stone skin."
 trophy_hunter_perk_name:0 "Trophy Hunter"
 trophy_hunter_perk_desc:0 "Mounting the stuffed heads of your prey in your great hall commands respect and instills fear."
 venom_resistance_perk_name:0 "Venom Resistance"
 venom_resistance_perk_desc:0 "Brewing potent anti-poisons and herbal elixirs renders your blood unpalatable to poisonous beasts and assassins alike."
 lethal_precision_perk_name:0 "Lethal Precision"
 lethal_precision_perk_desc:0 "With specialized broad-bladed weaponry, you know exactly where to strike to pierce thick carapaces and hardened scales."
 wild_instincts_perk_name:0 "Wild Instincts"
 wild_instincts_perk_desc:0 "A sixth sense warns you of sudden ambushes from wall-dwelling beasts and prevents disastrous retreats."
 legendary_slayer_perk_name:0 "Slayer Master"
 legendary_slayer_perk_desc:0 "You are now recognized as a Slayer Master, capable of assigning tasks to others and taking down the realm's most terrifying beasts."
 legendary_slayer_perk_effect:0 "Vastly increases the quality of trophies gained from successful hunts."

 # Human Slayer Perks
 bounty_hunter_perk_name:0 "Bounty Hunter"
 bounty_hunter_perk_desc:0 "Whether in civilized lands or the deep wilderness, you have a knack for finding those who do not wish to be found."
 bounty_hunter_perk_effect:0 "Grants unique dialogue options when dealing with criminals."
 relentless_pursuit_perk_name:0 "Relentless Pursuit"
 relentless_pursuit_perk_desc:0 "Conserving your energy allows you to run without tiring when you have the scent of your quarry."
 dead_or_alive_perk_name:0 "Dead or Alive"
 dead_or_alive_perk_desc:0 "You are equally adept at dragging them back in chains, or sending them to the grave with nothing but the clothes on their back."
 underworld_connections_perk_name:0 "Underworld Connections"
 underworld_connections_perk_desc:0 "To catch a criminal, one must know how to navigate the black markets and shady fences."
 ruthless_execution_perk_name:0 "Ruthless Execution"
 ruthless_execution_perk_desc:0 "Unleashing your weapon's full potential in one devastating special attack leaves your opponent with no time to react."
 fear_tactics_perk_name:0 "Fear Tactics"
 fear_tactics_perk_desc:0 "Your mere presence, adorned in the armor of your fallen foes, breaks the morale of your enemies before the battle begins."
 inescapable_perk_name:0 "Inescapable"
 inescapable_perk_desc:0 "Once you have engaged a target, you ensure they have no means of magical retreat or teleportation."
 manhunter_perk_name:0 "Manhunter"
 manhunter_perk_desc:0 "You are the apex predator of the untamed wilderness, feared by all who cross your path."
 manhunter_perk_effect:0 "Increases your chance to capture enemy commanders and rivals in battle."

 # Ethereal Slayer Perks
 beyond_the_veil_perk_name:0 "Beyond the Veil"
 beyond_the_veil_perk_desc:0 "You have opened your mind to the invisible world, communicating with spectres and studying texts the Church deems dangerous."
 beyond_the_veil_perk_effect:0 "Unlocks interactions with occult artifacts and possessed characters."
 iron_will_perk_name:0 "Iron Will"
 iron_will_perk_desc:0 "Mental fortitude and protective earmuffs protect your sanity when facing the piercing cries of banshees and mind-bending horrors."
 hex_breaker_perk_name:0 "Hex Breaker"
 hex_breaker_perk_desc:0 "You know the protective prayers and rituals required to deflect magical attacks and lift malignant curses."
 banisher_of_demons_perk_name:0 "Banisher of Demons"
 banisher_of_demons_perk_desc:0 "Armed with demonbane steel and righteous fury, abyssal creatures cower before you."
 blessed_armaments_perk_name:0 "Salve Armaments"
 blessed_armaments_perk_desc:0 "Your amulets and weapons are anointed with holy oils, allowing them to bite deeply into undead and ethereal flesh."
 purifying_flame_perk_name:0 "Purifying Flame"
 purifying_flame_perk_desc:0 "Fire is the ultimate cleanser. You employ elemental runes and fire spells liberally upon the battlefield."
 soul_reaper_perk_name:0 "Soul Reaper"
 soul_reaper_perk_desc:0 "Every strike of your weapon reaps the souls of your enemies, severing restless spirits from the mortal plane."
 master_exorcist_perk_name:0 "Master Exorcist"
 master_exorcist_perk_desc:0 "You are the shield that guards the realm from creatures born of the abyss and the horrors of the dead."
 master_exorcist_perk_effect:0 "Grants resistance against supernatural events and demonic plots for your entire dynasty."